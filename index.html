<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Cloudflare Clean IP Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌌 بک‌گراند غبار متحرک بومی CSS بدون نیاز به کانواس سنگین */
        .ambient-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 42, 0, 0.15) 0%, rgba(255, 106, 0, 0.05) 40%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        .network-panel {
            position: relative;
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(6, 6, 12, 0.7);
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 90, 0, 0.2);
            box-shadow: 0 40px 90px rgba(0,0,0,0.95);
            width: 550px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 40%, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .action-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 2;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 15px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border-radius: 14px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn.copy-btn {
            flex: 1;
            background: linear-gradient(135deg, #2dbcff, #0088cc);
        }
        .btn:hover { box-shadow: 0 0 35px rgba(255, 119, 0, 0.4); }
        .btn.copy-btn:hover { box-shadow: 0 0 35px rgba(0, 136, 204, 0.4); }
        .btn:disabled { background: #333 !important; color: #777; cursor: not-allowed; box-shadow: none !important; }

        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 18px;
            height: 330px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            text-align: left;
            background: rgba(3, 3, 5, 0.95);
            color: #00ff66;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.6);
            user-select: text;
            -webkit-user-select: text;
            white-space: pre;
            line-height: 1.5;
        }
        .cmd-terminal .info { color: #ffaa00; }
        .cmd-terminal .white { color: #ffffff; }
        .cmd-terminal .gray { color: #888888; }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="network-panel">
