<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        /* پنجره مرکزی شیشه‌ای اختصاصی شما */
        .singularity-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            text-align: center;
            padding: 35px 50px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.35);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 90, 0, 0.15);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
        }
        .singularity-core h2 {
            color: #fff; 
            font-size: 2.2rem; 
            margin-bottom: 25px;
            letter-spacing: 3px; 
            font-weight: 800;
        }
        .btn {
            display: inline-block; 
            text-decoration: none; 
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px 42px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 30px; 
            letter-spacing: 1px; 
            transition: all 0.3s ease;
            border: none;
        }
        .btn:hover { 
            box-shadow: 0 0 40px #ff7700, 0 0 15px #ff3700; 
            transform: scale(1.06); 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="singularity-core">
        <h2>@phrazel</h2>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');

            let width, height, centerX, centerY, dpr;

            function resizeAndScale() {
                dpr = Math.min(window.devicePixelRatio || 1, 2); 
                width = window.innerWidth;
                height = window.innerHeight;
                
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                
                centerX = (width / 2) * dpr;
                centerY = (height / 2) * dpr;
            }

            resizeAndScale();

            // ساخت غبار کیهانی گازی (Cloud Dust Particles)
            const particleCount = 450; 
            const particles = [];
            // رنگ‌بندی داغ، مات و گداخته دقیقاً هماهنگ با عکس تلسکوپ افق رویداد (EHT)
            const colors = ['#ff2a00', '#ff5100', '#ff7700', '#ff9900', '#ffaa00'];

            class Particle {
                constructor() {
                    this.reset();
                    this.radius = Math.random() * (Math.max(canvas.width, canvas.height) / 1.3);
                    this.angle = Math.random() * Math.PI * 2;
                }

                reset() {
                    this.angle = Math.random() * Math.PI * 2;
                    // چرخش فشرده‌تر ذرات برای ایجاد فرم هاله ابری دور دایره مشکی
                    this.radius = 140 * dpr + Math.random() * (160 * dpr);
                    this.speed = (0.2 + Math.random() * 0.6) * dpr; 
                    this.rotationSpeed = 0.008 + Math.random() * 0.012; 
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    // سایز بزرگتر غبارها برای ایجاد افکت ابری مات و محو
                    this.size = (4 + Math.random() * 12) * dpr; 
                    this.opacity = 0;
                }

                update() {
                    this.angle += this.rotationSpeed;
                    // حرکت نوسانی جزئی برای شبیه‌سازی گاز مایع داغ
                    this.radius += Math.sin(this.angle * 2) * 0.15;

                    const coreRadius = 130 * dpr;
                    const horizonFade = 300 * dpr;

                    // فرمول غلظت گازها بر اساس فاصله از افق رویداد
                    if (this.radius < horizonFade && this.radius > coreRadius) {
                        this.opacity = (horizonFade - this.radius) / (horizonFade - coreRadius) * 0.25;
                    } else {
                        this.opacity = 0.02;
                    }
                }

                draw() {
                    const x = centerX + Math.cos(this.angle) * this.radius;
                    const y = centerY + Math.sin(this.angle) * this.radius * 0.7; // انحراف بیضوی تلسکوپی

                    // رندر ذرات به صورت هاله‌های نوری پودری و بسیار نرم
                    ctx.beginPath();
                    ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            const animate = () => {
                // پاک کردن فریم با دنباله گازی عمیق
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = 'rgba(1, 1, 3, 0.08)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const coreRadius = 125 * dpr;
                const glowRadius = 320 * dpr;

                // ۱. افکت بلوم و درخشش حجیم گازهای پس‌زمینه (M87 Plasma Glow)
                const mainGlow = ctx.createRadialGradient(centerX, centerY, coreRadius, centerX, centerY, glowRadius);
                mainGlow.addColorStop(0, 'rgba(255, 40, 0, 0.45)');
                mainGlow.addColorStop(0.3, 'rgba(255, 100, 0, 0.15)');
                mainGlow.addColorStop(0.6, 'rgba(255, 150, 0, 0.02)');
                mainGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = mainGlow;
                ctx.beginPath();
                ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2);
                ctx.fill();

                // ۲. رسم و پردازش ابر غبار فوتونی
                ctx.shadowBlur = 0; // بهینه‌سازی سرعت بدون درگیر کردن سی‌پی‌یو
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                // ۳. افق رویداد و هسته تاریک مطلق (Schwarzschild Shadow Void)
                ctx.globalAlpha = 1.0;
                ctx.beginPath();
                ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#010103';
                ctx.fill();

                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', () => {
                resizeAndScale();
            });

            window.addEventListener('mousemove', (e) => {
                const rawX = window.innerWidth / 2 + (e.clientX - window.innerWidth / 2) * 0.035;
                const rawY = window.innerHeight / 2 + (e.clientY - window.innerHeight / 2) * 0.035;
                centerX = rawX * dpr;
                centerY = rawY * dpr;
                const core = document.querySelector('.singularity-core');
                if(core) {
                    core.style.left = `${rawX}px`;
                    core.style.top = `${rawY}px`;
                }
            });

            animate();
        });
    </script>
</body>
</html>
