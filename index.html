<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Network Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        /* باکس شیشه‌ای مرکزی کنترل شبکه */
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            text-align: center;
            padding: 40px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.6);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            width: 360px;
        }
        
        .network-panel h2 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .info-box {
            background: rgba(255, 69, 0, 0.05);
            border: 1px solid rgba(255, 69, 0, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            color: #aaa;
            font-family: monospace;
            font-size: 0.95rem;
            text-align: left;
        }

        .info-box b {
            color: #ff8c00;
        }

        .info-box span {
            float: right;
            color: #fff;
            font-weight: bold;
        }

        .btn {
            display: block; 
            width: 100%;
            text-decoration: none; 
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 12px; 
            letter-spacing: 1px; 
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 55, 0, 0.2);
        }

        .btn:hover { 
            box-shadow: 0 0 30px rgba(255, 119, 0, 0.6); 
            transform: scale(1.02); 
        }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        
        <div class="info-box">
            📄 Your IP: <span id="user-ip">Loading...</span>
        </div>
        
        <div class="info-box">
            ⚡ Cloudflare Ping: <span id="ping-cf">- ms</span>
        </div>

        <div class="info-box">
            🌍 Google Ping: <span id="ping-google">- ms</span>
        </div>

        <button class="btn" onclick="checkNetwork()">REFRESH NETWORK</button>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        // 🌐 بخش اول: جاوااسکریپت ابزار شبکه (IP & Ping)
        async function getIP() {
            document.getElementById('user-ip').innerText = "Fetching...";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').innerText = data.ip;
            } catch (error) {
                document.getElementById('user-ip').innerText = "Error / Blocked";
            }
        }

        function measurePing(url, elementId) {
            const startTime = Date.now();
            document.getElementById(elementId).innerText = "...";
            
            // استفاده از ترفند لود عکس برای دور زدن محدودیت CORS در پینگ مرورگر
            const img = new Image();
            img.onload = function() {
                const ping = Date.now() - startTime;
                document.getElementById(elementId).innerText = ping + " ms";
            };
            img.onerror = function() {
                // در هر دو حالت لود یا ارور، زمان پاسخ‌دهی همان پینگ شبکه است
                const ping = Date.now() - startTime;
                document.getElementById(elementId).innerText = ping + " ms";
            };
            // افزودن پارامتر رندوم برای جلوگیری از خواندن از کش مرورگر
            img.src = url + "?cache=" + Math.random();
        }

            getIP();
            measurePing('https://1.1.1.1/favicon.ico', 'ping-cf');
            measurePing
