<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core Console Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            width: 440px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 12px; 
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { 
            box-shadow: 0 0 30px rgba(255, 119, 0, 0.6); 
        }
        .terminal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tab-btn {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
        }
        .tab-btn.active[data-type="cmd"] {
            background: #000; color: #00ff00; border-color: #00ff00;
        }
        .tab-btn.active[data-type="ps"] {
            background: #012456; color: #fff; border-color: #2dbcff;
        }
        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            text-align: left;
        }
        .cmd-terminal.theme-cmd { background: rgba(0, 0, 0, 0.9); color: #00ff00; }
        .cmd-terminal.theme-ps { background: rgba(1, 36, 86, 0.95); color: #ffffff; }
        .cmd-terminal .info { color: #ffaa00; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        <div class="input-group">
            <input type="text" id="target-target" placeholder="e.g., 172.65.155.197" value="172.65.155.197" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn" onclick="startExecutionPing()">TEST CONNECTION</button>
        <div class="terminal-tabs">
            <button class="tab-btn active" data-type="cmd" onclick="setTerminalTheme('cmd')">cmd.exe</button>
            <button class="tab-btn" data-type="ps" onclick="setTerminalTheme('ps')">PowerShell</button>
        </div>
        <div class="cmd-terminal theme-cmd" id="terminal-out">
            <p class="info">Console ready. Select interface and ping...</p>
        </div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        let currentTheme = 'cmd';

        function setTerminalTheme(theme) {
            currentTheme = theme;
            const term = document.getElementById('terminal-out');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.tab-btn[data-type="${theme}"]`).classList.add('active');
            if (theme === 'cmd') {
                term.className = 'cmd-terminal theme-cmd';
                term.innerHTML = '<p class="info">Switched to Command Prompt. System ready.</p>';
            } else {
                term.className = 'cmd-terminal theme-ps';
                term.innerHTML = '<p style="color:#2dbcff">Windows PowerShell<br>Copyright (C) Microsoft Corporation.</p><p class="info">Ready for Test-Connection...</p>';
            }
        }

        function logToTerminal(text, className = '') {
            const term = document.getElementById('terminal-out');
            const p = document.createElement('p');
            if(className) p.className = className;
            if (currentTheme === 'ps' && !className) {
                p.innerHTML = `<span style="color:#2dbcff">PS C:\\Users\\neuxp></span> ${text}`;
            } else if (currentTheme === 'cmd' && !className) {
                p.innerHTML = `<span>C:\\Users\\neuxp></span>${text}`;
            } else { p.innerText = text; }
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }
