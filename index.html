<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            overflow: hidden;
            font-family: sans-serif;
            position: relative;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 🌌 باکس هسته مرکزی سیاه‌چاله */
        .singularity-core {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 10;
            text-align: center;
            padding: 40px;
            border-radius: 50%;
            width: 280px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff00;
            
            /* وضعیت اولیه برای انیمیشن ورود ناگهانی ناسا */
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            
            /* اجرای انیمیشن ورود */
            animation: nasaIntro 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.3s;
        }
        h1 {
            font-size: 2.4rem;
            color: #00ff00;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff00;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #00ff00;
            background: #000000;
            border: 1px solid #00ff00;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 25px;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 25px #00ff00;
            transform: scale(1.05);
            cursor: pointer;
        }

        /* 🎬 انیمیشن ورود ناگهانی و انفجاری ناسا */
        @keyframes nasaIntro {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
                box-shadow: 0 0 0px rgba(0, 255, 0, 0);
            }
            70% {
                box-shadow: 0 0 40px #00ff00; /* شلیک نور سبز */
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            }
        }
    </style>
</head>

        <h1>@phrazel</h1>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>
