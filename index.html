<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Cloudflare Clean IP Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020206;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .network-panel {
            position: relative;
            z-index: 10; 
            padding: 30px; 
            border-radius: 20px;
            background: #09090d;
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            width: 560px;
        }
        .network-panel h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
        }
        .action-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            flex: 2;
            color: #ffffff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.85rem;
            border-radius: 12px; 
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .btn.copy-btn {
            flex: 1;
            background: linear-gradient(135deg, #2dbcff, #0088cc);
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #222225 !important; color: #555558; cursor: not-allowed; opacity: 1; }

        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            height: 340px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            text-align: left;
            background: #030306;
            color: #00ff66;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.8);
            user-select: text;
            -webkit-user-select: text;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>

            <button class="btn copy-btn" id="copyBtn" onclick="copyTableResult()" disabled>Copy Result</button>
        </div>
