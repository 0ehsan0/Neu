<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core Ping Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            width: 400px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff8c00;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 12px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn:hover { 
            box-shadow: 0 0 30px rgba(255, 119, 0, 0.6); 
        }
        .cmd-terminal {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #00ff00;
            text-align: left;
        }
        .cmd-terminal p {
            margin-bottom: 6px;
            line-height: 1.4;
            word-break: break-all;
        }
        .cmd-terminal .err { color: #ff3300; }
        .cmd-terminal .info { color: #ffaa00; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        
        <div class="input-group">
            <input type="text" id="target-target" placeholder="e.g., 1.1.1.1 or google.com" value="1.1.1.1" autocomplete="off" spellcheck="false">
        </div>
        
        <button class="btn" onclick="startExecutionPing()">PING TARGET</button>

        <div class="cmd-terminal" id="terminal-out">
            <p class="info">Ready to analyze network connection...</p>
        </div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        function logToTerminal(text, className = '') {
            const term = document.getElementById('terminal-out');
            const p = document.createElement('p');
            if(className) p.className = className;
            p.innerText = text;
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        async function startExecutionPing() {
            let target = document.getElementById('target-target').value.trim();
            const term = document.getElementById('terminal-out');
            
            if (!target) {
                logToTerminal("Error: Field cannot be empty.", "err");
                return;
            }

            // تمیز کردن ورودی‌ها از پروتکل‌های اضافی ارسالی کاربران
            target = target.replace(/^(https?:\/\/)/, "").replace(/\/$/, "");
            term.innerHTML = ""; 
            
            logToTerminal(`Pinging ${target} via Network Interface:`, "info");

            for (let i = 1; i <= 4; i++) {
                await new Promise(resolve => {
                    const startTime = Date.now();
                    let completed = false;

                    // استفاده از ترفند لود مستقیم دامنه‌ بر پایه پورت‌های عمومی وب بدون دخالت CORS
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => {
                        if (!completed) {
                            completed = true;
                            controller.abort();
                            logToTerminal(`Request timed out for packet ${i}.`, "err");
                            resolve();
                        }
                    }, 3500);

                    fetch(`https://${target}/?t=${Math.random()}`, { 
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        signal: controller.signal 
                    })
                    .then(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            logToTerminal(`Reply from ${target}: packets=${i} time=${duration}ms status=alive`);
                            resolve();
                        }
                    })
                    .catch(() => {
                        // در حالت no-cors حتی در صورت ارور گواهی یا هندشیک، اتصال برقرار شده و تایمینگ پینگ دقیق است
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            if (duration < 3000) {
                                logToTerminal(`Reply from ${target}: packets=${i} time=${duration}ms connected`);
                            } else {
                                logToTerminal(`Request timed out for packet ${i}.`, "err");
                            }
                            resolve();
                        }
                    });
                });
                
                // تاخیر ۵۰۰ میلی‌ثانیه‌ای بین پکت‌ها برای شبیه‌سازی گام‌به‌گام ترمینال
                await new Promise(r => setTimeout(r, 500));
            }
        }

        // 🌌 موتور گرافیکی غبار گازی سیاه‌چاله EHT
        window.addEventListener('load', () => {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY, dpr;

            function resizeAndScale() {
                dpr = Math.min(window.devicePixelRatio || 1, 2); 
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width * dpr; canvas.height = height * dpr;
                centerX = (width / 2) * dpr; centerY = (height / 2) * dpr;
            }
            resizeAndScale();

            const particleCount = 450; const particles = [];
            const colors = ['#ff2a00', '#ff5100', '#ff7700', '#ff9900', '#ffffff'];

            class Particle {
                constructor() {
                    this.reset();
                    this.radius = Math.random() * (Math.max(canvas.width, canvas.height) / 1.3);
                    this.angle = Math.random() * Math.PI * 2;
                }
                reset() {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = 135 * dpr + Math.random() * (180 * dpr);
                    this.speed = (0.3 + Math.random() * 0.7) * dpr; 
                    this.rotationSpeed = 0.009 + Math.random() * 0.014; 
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.size = (3 + Math.random() * 9) * dpr; 
                    this.opacity = 0;
                }
                update() {
                    this.angle += this.rotationSpeed;
                    this.radius += Math.sin(this.angle * 2) * 0.12;
                    const coreRadius = 125 * dpr; const horizonFade = 320 * dpr;
                    if (this.radius < horizonFade && this.radius > coreRadius) {
                        this.opacity = (horizonFade - this.radius) / (horizonFade - coreRadius) * 0.28;
                    } else { this.opacity = 0.02; }
                }
                draw() {
                    const x = centerX + Math.cos(this.angle) * this.radius;
                    const y = centerY + Math.sin(this.angle) * this.radius * 0.68; 
                    ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            const animate = () => {
                ctx.globalAlpha = 1.0; ctx.fillStyle = 'rgba(1, 1, 3, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const coreRadius = 120 * dpr; const glowRadius = 340 * dpr;
                const mainGlow = ctx.createRadialGradient(centerX, centerY, coreRadius, centerX, centerY, glowRadius);
                mainGlow.addColorStop(0, 'rgba(255, 35, 0, 0.45)');
                mainGlow.addColorStop(0.25, 'rgba(255, 90, 0, 0.16)');
                mainGlow.addColorStop(0.6, 'rgba(255, 140, 0, 0.02)');
                mainGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = mainGlow; ctx.beginPath(); ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2); ctx.fill();

                particles.forEach(p => { p.update(); p.draw(); });
                ctx.globalAlpha = 1.0; ctx.beginPath(); ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2); ctx.fillStyle = '#010103'; ctx.fill();
                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', () => { resizeAndScale(); });
            animate();
        });
    </script>
</body>
</html>
