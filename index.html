<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Singularity | @phrazel</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* لایه‌بندی آنی متون ناسا */
        #titulo {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #fff;
            z-index: 10;
            letter-spacing: 4px;
            font-weight: 800;
            font-size: 1.8rem;
            text-transform: uppercase;
        }
        #titulo small {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ff8c00;
            margin-top: 5px;
            font-weight: 400;
        }
        #datos {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #aaa;
            z-index: 10;
            font-size: 0.8rem;
            line-height: 1.6;
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #datos b { color: #ff4500; }

        /* باکس شیشه‌ای مرکزی اختصاصی شما - لود آنی */
        .singularity-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            text-align: center;
            padding: 30px 40px;
            border-radius: 16px;
            background: rgba(5, 5, 10, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .singularity-core h2 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            padding: 12px 35px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 25px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
        }
        .btn:hover {
            box-shadow: 0 0 30px #ff8c00;
            transform: scale(1.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="titulo">Black Hole<small>gravitational lensing · accretion disk · HDR bloom</small></div>

    <div id="datos">
        schwarzschild radius <b>rₛ = 1.0</b><br>
        photon sphere <b>r = 1.5 rₛ</b><br>
        inner disk edge <b>r ≈ 3 rₛ</b>
    </div>

    <div class="singularity-core">
        <h2>@phrazel</h2>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>

    <canvas id="canvas3d"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // استقرار آنی دوربین در موقعیت استاندارد بدون فاصله دور
        camera.position.set(0, 3, 7); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ساخت ۱۸ هزار ذره گاز داغ بیضوی
        const particleCount = 18000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPalette = [
            new THREE.Color('#ff4500'),
            new THREE.Color('#ff8c00'),
            new THREE.Color('#ffd700'),
            new THREE.Color('#111122')
        ];

        for (let i = 0; i < particleCount; i++) {
            const radius = 1.6 + Math.pow(Math.random(), 2) * 6.5;
            const angle = Math.random() * Math.PI * 2;
            const distortion = Math.sin(angle) * 0.15 * (1.0 / radius);
            
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.1 * (radius * 0.3) + distortion;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            let clr = colorPalette[0];
            if (radius > 4.5) clr = colorPalette[3];
            else if (radius > 3.0) clr = colorPalette[1];
            else if (Math.random() > 0.6) clr = colorPalette[2];

            if (x < 0) clr = clr.clone().multiplyScalar(0.4);

            colors[i * 3] = clr.r;
            colors[i * 3 + 1] = clr.g;
            colors[i * 3 + 2] = clr.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const pointCloud = new THREE.Points(geometry, material);
        scene.add(pointCloud);

        // هسته مرکزی مشکی
        const coreGeo = new THREE.SphereGeometry(1.0, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHoleCore = new THREE.Mesh(coreGeo, coreMat);
        scene.add(blackHoleCore);

        const clock = new THREE.Clock();

        const animate = () => {
            const elapsedTime = clock.getElapsedTime();

            // چرخش مداوم ذرات گاز حول محور عمودی
            pointCloud.rotation.y = elapsedTime * 0.25;

            // چرخش آرام و سینمایی زاویه دوربین در فضا حول مرکز دیسک
            camera.position.x = Math.sin(elapsedTime * 0.08) * 7;
            camera.position.z = Math.cos(elapsedTime * 0.08) * 7;
            
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX - window.innerWidth / 2) * 0.0003;
            const mouseY = (e.clientY - window.innerHeight / 2) * 0.0003;
            pointCloud.rotation.x = mouseY;
            pointCloud.rotation.z = mouseX;
        });

        animate();
    </script>
</body>
</html>
