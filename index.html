            /* وضعیت اولیه برای پدیدار شدن نرم همزمان با زوم دوربین */

            transform: translate(-50%, -50%) scale(0.5);

    <canvas id="canvas3d"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // تنظیم موقعیت اولیه دوربین در فاصله‌ی بسیار دور (سیاه مطلق بودن اولیه)
        camera.position.set(0, 0, 150); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ساخت ۱۸ هزار ذره گاز داغ بیضوی
        const particleCount = 18000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPalette = [
            new THREE.Color('#ff4500'),
            new THREE.Color('#ff8c00'),
            new THREE.Color('#ffd700'),
            new THREE.Color('#111122')
        ];

        for (let i = 0; i < particleCount; i++) {
            const radius = 1.6 + Math.pow(Math.random(), 2) * 6.5;
            const angle = Math.random() * Math.PI * 2;
            const distortion = Math.sin(angle) * 0.15 * (1.0 / radius);
            
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.1 * (radius * 0.3) + distortion;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            let clr = colorPalette[0];
            if (radius > 4.5) clr = colorPalette[3];
            else if (radius > 3.0) clr = colorPalette[1];
            else if (Math.random() > 0.6) clr = colorPalette[2];

            if (x < 0) clr = clr.clone().multiplyScalar(0.4);

            colors[i * 3] = clr.r;
