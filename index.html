<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Cloudflare Advanced Diagnostic Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(4, 4, 7, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.22);
            box-shadow: 0 35px 80px rgba(0,0,0,0.95);
            width: 540px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 40%, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .action-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 2;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 15px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border-radius: 14px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn.copy-btn {
            flex: 1;
            background: linear-gradient(135deg, #2dbcff, #0088cc);
        }
        .btn:hover { box-shadow: 0 0 35px rgba(255, 119, 0, 0.4); }
        .btn.copy-btn:hover { box-shadow: 0 0 35px rgba(0, 136, 204, 0.4); }
        .btn:disabled { background: #333 !important; color: #777; cursor: not-allowed; box-shadow: none !important; }

        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 18px;
            height: 320px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            text-align: left;
            background: rgba(3, 3, 5, 0.92);
            color: #00ff66;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.6);
            user-select: text;
            -webkit-user-select: text;
            white-space: pre;
            line-height: 1.5;
        }
        .cmd-terminal .info { color: #ffaa00; }
        .cmd-terminal .white { color: #ffffff; }
        .cmd-terminal .gray { color: #888888; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        
        <div class="action-container">
            <button class="btn" id="scanBtn" onclick="startCloudflareScanner()">Start Advanced Scan</button>
            <button class="btn copy-btn" id="copyBtn" onclick="copyTableResult()" disabled>Copy IPs</button>
        </div>

        <div class="cmd-terminal" id="terminal-out">Microsoft Windows [Version 10.0.19045]
(c) Microsoft Corporation. All rights reserved.

Console ready. Click "Start Advanced Scan" to run diagnosis...</div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        let discoveredIPs = [];

        function writeRaw(text) {
            const term = document.getElementById('terminal-out');
            term.innerHTML += text + "\n";
            term.scrollTop = term.scrollHeight;
        }

        async function startCloudflareScanner() {
            const btn = document.getElementById('scanBtn');
            const copyBtn = document.getElementById('copyBtn');
            const term = document.getElementById('terminal-out');
            
            btn.disabled = true;
            copyBtn.disabled = true;
            term.innerHTML = "";
            discoveredIPs = [];

            // --- Ы±. Щ…Ш±Ш­Щ„Щ‡ ЩѕЫЊЩ†ЪЇ Ш±Щ†Ш¬вЂЊЩ‡Ш§ (Latency Test) ---
            writeRaw("<span class='info'>Start latency test (Mode: TCP, Port: 443, Range: 0 ~ 9999 ms, Packet Loss: 1.00)</span>");
            
            // ШґШЁЫЊЩ‡вЂЊШіШ§ШІЫЊ Щ„Ш§ЫЊЩ€ Щ€ ЪЇШ§Щ…вЂЊШЁЩ‡вЂЊЪЇШ§Щ… Щ„Щ€ШЇ ЩѕЪ©ШЄвЂЊЩ‡Ш§ Щ…Ш·Ш§ШЁЩ‚ Ш®Ш±Щ€Ш¬ЫЊ Щ†Ш±Щ…вЂЊШ§ЩЃШІШ§Ш±
            for(let p = 1000; p <= 5956; p += Math.floor(Math.random() * 800) + 400) {
                term.innerHTML = term.innerHTML.substring(0, term.innerHTML.lastIndexOf("Start latency test") + 82);
                writeRaw(`${p} / 5956 [-----------------------------------------------------------------------------------] Available: ${Math.floor(p/14)}  1m59s`);
                await new Promise(r => setTimeout(r, 150));
            }
            term.innerHTML = term.innerHTML.substring(0, term.innerHTML.lastIndexOf("Start latency test") + 82);
            writeRaw("5956 / 5956 [-----------------------------------------------------------------------------------] Available: 440  1m59s");

            await new Promise(r => setTimeout(r, 400));

            // --- ЫІ. Щ…Ш±Ш­Щ„Щ‡ ШЄШіШЄ ШЇШ§Щ†Щ„Щ€ШЇ (Download Speed Test) ---
            writeRaw("<span class='info'>Start download speed test (Minimum speed: 0.00 MB/s, Number: 10, Queue: 10)</span>");
            for(let d = 1; d <= 10; d++) {
                term.innerHTML = term.innerHTML.substring(0, term.innerHTML.lastIndexOf("Start download speed test") + 90);
                writeRaw(`${d} / 10 [--------------------------------------------------------------------------------------------]            1m40s`);
                await new Promise(r => setTimeout(r, 120));
            }

            await new Promise(r => setTimeout(r, 300));

            // --- Ыі. Ш§ЫЊШ¬Ш§ШЇ Ш¬ШЇЩ€Щ„ Щ†Щ‡Ш§ЫЊЫЊ Щ…Ш·Ш§ШЁЩ‚ ШіШ§Ш®ШЄШ§Ш± Ш®Ш±Щ€Ш¬ЫЊ ШЁШ±Щ†Ш§Щ…Щ‡ ШґЩ…Ш§ ---
            writeRaw("<span class='white'>IP Address      Sent Received Loss-Rate Average-Delay Download-Speed (MB/s)</span>");
            
            // Щ„ЫЊШіШЄ Ш±Щ†Ш¬вЂЊЩ‡Ш§ЫЊ ШўЫЊвЂЊЩѕЩђЫЊ ШЄЩ…ЫЊШІ Ш§ШіШЄШ®Ш±Ш§Ш¬ ШґШЇЩ‡ Ш§ШІ Ш®Ш±Щ€Ш¬ЫЊ Щ†Щ…Щ€Щ†Щ‡ ШЁШ±Щ†Ш§Щ…Щ‡ ШґЩ…Ш§
            const sampleIPs = [
                "104.17.145.232", "104.19.79.174", "104.19.78.11", "104.19.50.71", 
                "104.19.42.122", "104.19.61.237", "104.19.64.172", "104.19.90.102", 
                "104.19.66.167", "104.19.96.214"
            ];
            discoveredIPs = [...sampleIPs];

            // Ш§ЫЊШ¬Ш§ШЇ ЩЃШ§ШµЩ„Щ‡вЂЊЪЇШ°Ш§Ш±ЫЊвЂЊЩ‡Ш§ЫЊ ШіШ§Ш®ШЄШ§Ш±ЫЊШ§ЩЃШЄЩ‡ Щ…Ш§ШЄШ±ЫЊШіЫЊ (Padding) ШЁШ±Ш§ЫЊ ШЄШ±Ш§ШІ ШґШЇЩ† ШіШЄЩ€Щ†вЂЊЩ‡Ш§ ШЇШ± ЩЃЩ€Щ†ШЄ Щ…Щ€Щ†Щ€
            sampleIPs.forEach(ip => {
                let ipPadding = ip.padEnd(16, ' ');
                let delay = (10 + Math.random() * 25).toFixed(2);
                let delayPadding = delay.padEnd(14, ' ');
                let speed = (12 + Math.random() * 28).toFixed(2); // ШґШЁЫЊЩ‡вЂЊШіШ§ШІЫЊ ШіШ±Ш№ШЄ ШЇШ§Щ†Щ„Щ€ШЇ ШІЩ†ШЇЩ‡ Щ…ШЄЩ†Ш§ШіШЁ ШЁШ§ ЩѕЫЊЩ†ЪЇ Ш®Ш·
                
                writeRaw(`${ipPadding}4      4      0.00          ${delayPadding}${speed}`);
            });

            writeRaw("\n<span class='gray'>Complete test results have been written to result.csv file.\nPress Enter or Ctrl+C to exit.</span>");
            
            btn.disabled = false;
            copyBtn.disabled = false;
        }

        function copyTableResult() {
            if (discoveredIPs.length === 0) return;
            navigator.clipboard.writeText(discoveredIPs.join('\n')).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = "COPIED!";
                setTimeout(() => { copyBtn.innerText = "Copy IPs"; }, 1500);
            });
        }

        // рџЊЊ Щ…Щ€ШЄЩ€Ш± Ш§Щ†ЫЊЩ…ЫЊШґЩ† ЩѕШівЂЊШІЩ…ЫЊЩ†Щ‡ ШіЫЊШ§Щ‡вЂЊЪ†Ш§Щ„Щ‡ EHT
        window.addEventListener('load', () => {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY, dpr;

            function resizeAndScale() {
                dpr = Math.min(window.devicePixelRatio || 1, 2); 
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width * dpr; canvas.height = height * dpr;
                centerX = (width / 2) * dpr; centerY = (height / 2) * dpr;
            }
            resizeAndScale();

            const particleCount = 400; const particles = [];
            const colors = ['#ff2a00', '#ff5100', '#ff7700', '#ff9900', '#ffffff'];

            class Particle {
                constructor() {
                    this.reset();
                    this.radius = Math.random() * (Math.max(canvas.width, canvas.height) / 1.3);
                    this.angle = Math.random() * Math.PI * 2;
                }
                reset() {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = 135 * dpr + Math.random() * (180 * dpr);
                    this.speed = (0.3 + Math.random() * 0.7) * dpr; 
                    this.rotationSpeed = 0.009 + Math.random() * 0.014; 
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.size = (3 + Math.random() * 8) * dpr; 
                    this.opacity = 0;
                }
                update() {
                    this.angle += this.rotationSpeed;
                    this.radius += Math.sin(this.angle * 2) * 0.12;
                    const coreRadius = 125 * dpr; const horizonFade = 320 * dpr;
                    if (this.radius < horizonFade && this.radius > coreRadius) {
                        this.opacity = (horizonFade - this.radius) / (horizonFade - coreRadius) * 0.28;
                    } else { this.opacity = 0.02; }
                }
                draw() {
                    const x = centerX + Math.cos(this.angle) * this.radius;
                    const y = centerY + Math.sin(this.angle) * this.radius * 0.68; 
                    ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            const animate = () => {
                ctx.globalAlpha = 1.0; ctx.fillStyle = 'rgba(1, 1, 3, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const coreRadius = 120 * dpr; const glowRadius = 340 * dpr;
                const mainGlow = ctx.createRadialGradient(centerX, centerY, coreRadius, centerX, centerY, glowRadius);
                mainGlow.addColorStop(0, 'rgba(255, 35, 0, 0.45)');
                mainGlow.addColorStop(0.25, 'rgba(255, 90, 0, 0.16)');
                mainGlow.addColorStop(0.6, 'rgba(255, 140, 0, 0.02)');
                mainGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = mainGlow; ctx.beginPath(); ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2); ctx.fill();

                particles.forEach(p => { p.update(); p.draw(); });
                ctx.globalAlpha = 1.0; ctx.beginPath(); ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2); ctx.fillStyle = '#010103'; ctx.fill();
                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', () => { resizeAndScale(); });
            animate();
        });
    </script>
</body>
</html>
