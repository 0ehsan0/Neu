<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     @phrazel</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* بوم رندرینگ ۳بعدی */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            
            /* وضعیت اولیه: مخفی و نقطه ریز در مرکز */
            opacity: 0;
            transform: scale(0.01);
            filter: blur(20px);
            
            /* انیمیشن ورود ناگهانی کل فضا بعد از ۲ ثانیه */
            animation: bigBangIntro 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 2s;
        }

        /* لایه بندی متون ناسا */
        #titulo, #datos {
            position: absolute;
            color: #fff;
            z-index: 10;
            opacity: 0;
            animation: fadeInText 1.5s ease forwards;
            animation-delay: 3.5s; /* لود شدن متن‌ها بعد از استقرار سیاه‌چاله */
        }
        #titulo {
            top: 30px;
            left: 30px;
            letter-spacing: 4px;
            font-weight: 800;
            font-size: 1.8rem;
            text-transform: uppercase;
        }
        #titulo small {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ff8c00;
            margin-top: 5px;
            font-weight: 400;
        }
        #datos {
            bottom: 30px;
            left: 30px;
            color: #aaa;
            font-size: 0.8rem;
            line-height: 1.6;
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #datos b { color: #ff4500; }

        /* باکس شیشه‌ای مرکزی اختصاصی شما */
        .singularity-core {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 15;
            text-align: center;
            padding: 30px 40px;
            border-radius: 16px;
            background: rgba(5, 5, 10, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,140,0,0.05);
            
            /* وضعیت اولیه: کاملاً مخفی و صفر در نقطه وسط */
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.01);
            filter: blur(15px);
            
            /* انیمیشن زوم از مرکز همزمان با باز شدن فضا */
            animation: bigBangCore 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
            animation-delay: 2.2s;
        }

        .singularity-core h2 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            padding: 12px 35px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 25px;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 69, 0, 0.4);
            transition: all 0.3s ease;
            border: none;
        }
        .btn:hover {
            box-shadow: 0 0 30px #ff8c00;
            transform: scale(1.05);
            cursor: pointer;
        }

        /* 🎬 انیمیشن‌های بیگ‌بنگ و انفجار خطی از نقطه وسط */
        @keyframes bigBangIntro {
            0% {
                opacity: 0;
                transform: scale(0.01);
                filter: blur(20px);
            }
            30% {
                opacity: 0.8;
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        @keyframes bigBangCore {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.01);
                filter: blur(15px);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                filter: blur(0);
            }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 7);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // ساخت دیسک گدازه گازها با ۱۸ هزار ذره سه بعدی
        const particleCount = 18000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPalette = [
            new THREE.Color('#ff4500'),
            new THREE.Color('#ff8c00'),
            new THREE.Color('#ffd700'),
            new THREE.Color('#111122')
        ];

        for (let i = 0; i < particleCount; i++) {
            const radius = 1.6 + Math.pow(Math.random(), 2) * 6.5;
            const angle = Math.random() * Math.PI * 2;
            const distortion = Math.sin(angle) * 0.15 * (1.0 / radius);
            
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.1 * (radius * 0.3) + distortion;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            let clr = colorPalette[0];
            if (radius > 4.5) clr = colorPalette[3];
            else if (radius > 3.0) clr = colorPalette[1];
            else if (Math.random() > 0.6) clr = colorPalette[2];

            if (x < 0) { 
                clr = clr.clone().multiplyScalar(0.4);
            }

            colors[i * 3] = clr.r;
            colors[i * 3 + 1] = clr.g;
            colors[i * 3 + 2] = clr.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const pointCloud = new THREE.Points(geometry, material);
        scene.add(pointCloud);

        // هسته مشکی مطلق مرکزی
        const coreGeo = new THREE.SphereGeometry(1.0, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHoleCore = new THREE.Mesh(coreGeo, coreMat);
        scene.add(blackHoleCore);

        const haloGeo = new THREE.RingGeometry(1.0, 1.25, 64);
        const haloMat = new THREE.MeshBasicMaterial({
