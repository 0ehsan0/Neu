<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core CMD Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(4, 4, 7, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.22);
            box-shadow: 0 35px 80px rgba(0,0,0,0.95);
            width: 440px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 40%, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 69, 0, 0.25);
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        .input-group input:focus {
            border-color: #ff7700;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 15px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 14px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .btn:hover { 
            box-shadow: 0 0 35px rgba(255, 119, 0, 0.55); 
        }
        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 15px;
            height: 190px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            text-align: left;
            background: rgba(3, 3, 5, 0.9);
            color: #00ff66;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.6);
        }
        .cmd-terminal .info { color: #ffaa00; }
        .cmd-terminal .err { color: #ff3344; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        <div class="input-group">
            <input type="text" id="target-target" placeholder="Enter IP or Domain" value="172.65.155.197" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn" onclick="startExecutionPing()">Ping Target</button>

        <div class="cmd-terminal" id="terminal-out">
            <p class="info">Microsoft Windows [Version 10.0.19045]<br>Command Prompt initialized. Ready...</p>
        </div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        function logToTerminal(text, className = '') {
            const term = document.getElementById('terminal-out');
            const p = document.createElement('p');
            if(className) p.className = className;
            
            if (!className) {
                p.innerHTML = `<span style="color:rgba(0,255,102,0.35)">C:\\Users\\neuxp></span>${text}`;
            } else {
                p.innerText = text;
            }
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        async function startExecutionPing() {
            let target = document.getElementById('target-target').value.trim();
            const term = document.getElementById('terminal-out');
            if (!target) return;

            target = target.replace(/^(https?:\/\/)/, "").replace(/\/$/, "");
            term.innerHTML = ""; 
            logToTerminal(`Pinging ${target} with 32 bytes of data:`, "info");

            for (let i = 1; i <= 4; i++) {
                await new Promise(resolve => {
                    const startTime = Date.now();
                    let completed = false;
                    
                    // استفاده از درخواست مستقیم وب با مسدود کردن کش مرورگر
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => {
                        if (!completed) {
                            completed = true;
                            controller.abort();
                            logToTerminal(`Request timed out for packet ${i}.`, "err");
                            resolve();
                        }
                    }, 2500);

                    fetch(`https://${target}/?cache_burst=${Math.random()}`, { 
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        signal: controller.signal 
                    })
                    .then(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            logToTerminal(`Reply from ${target}: bytes=32 time=${duration}ms TTL=51`);
                            resolve();
                        }
                    })
                    .catch(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            // نمایش دقیق زمان پاسخ‌دهی لایه شبکه بدون دستکاری عددی
                            logToTerminal(`Reply from ${target}: bytes=32 time=${duration}ms TTL=51`);
                            resolve();
                        }
                    });
                });
                await new Promise(r => setTimeout(r, 450));
            }
        }

        // 🌌 موتور ذرات متراکم سیاه‌چاله EHT
        window.addEventListener('load', () => {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY, dpr;

            function resizeAndScale() {
                dpr = Math.min(window.devicePixelRatio || 1, 2); 
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width * dpr; canvas.height = height * dpr;
                centerX = (width / 2) * dpr; centerY = (height / 2) * dpr;
            }
            resizeAndScale();

            const particleCount = 400; const particles = [];
            const colors = ['#ff2a00', '#ff5100', '#ff7700', '#ff9900', '#ffffff'];

            class Particle {
                constructor() {
                    this.reset();
                    this.radius = Math.random() * (Math.max(canvas.width, canvas.height) / 1.3);
                    this.angle = Math.random() * Math.PI * 2;
                }
                reset() {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = 135 * dpr + Math.random() * (180 * dpr);
                    this.speed = (0.3 + Math.random() * 0.7) * dpr; 
                    this.rotationSpeed = 0.009 + Math.random() * 0.014; 
                    this.color = colors[Math.floor(Math.random() * colors.length)];
