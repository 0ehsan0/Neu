<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* باکس شیشه‌ای مرکزی اختصاصی شما */
        .singularity-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            text-align: center;
            padding: 35px 45px; 
            border-radius: 16px;
            background: rgba(4, 4, 8, 0.45);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 0, 0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,140,0,0.05);
        }
        .singularity-core h2 {
            color: #fff; 
            font-size: 2rem; 
            margin-bottom: 22px;
            letter-spacing: 2px; 
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn {
            display: inline-block; 
            text-decoration: none; 
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            padding: 13px 38px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 25px; 
            letter-spacing: 1px; 
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3);
        }
        .btn:hover { 
            box-shadow: 0 0 30px #ff8c00, 0 0 10px #ff4500; 
            transform: scale(1.05); 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="singularity-core">
        <h2>@phrazel</h2>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let centerX = width / 2;
        let centerY = height / 2;

        const particleCount = 550; // تراکم بالای ذرات برای ایجاد کیفیت غنی
        const particles = [];
        const colors = ['#ff4500', '#ff8c00', '#ffd700', '#ff6347', '#ffffff'];

        class Particle {
            constructor() {
                this.reset();
                this.radius = Math.random() * (Math.max(width, height) / 1.4);
                this.angle = Math.random() * Math.PI * 2;
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.max(width, height) / 1.4 + Math.random() * 50;
                this.speed = 1.0 + Math.random() * 2.0; 
                this.rotationSpeed = 0.018 + Math.random() * 0.025; 
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = 0.8 + Math.random() * 2.0;
                this.opacity = 0.1;
            }

            update() {
                this.radius -= this.speed;
                this.angle += this.rotationSpeed;

                // اوج گرفتن درخشش ذرات در افق رویداد (لبه هسته مرکزی)
                if (this.radius < 380 && this.radius > 130) {
                    this.opacity = (380 - this.radius) / 250;
                } else if (this.radius >= 380) {
                    this.opacity = 0.08;
                }

                if (this.radius <= 125) {
                    this.reset();
                }
            }

            draw() {
                // شبیه‌سازی انحراف دیسک برافزایشی به صورت بیضوی سینمایی (لنز گرانشی)
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius * 0.58; 

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        const animate = () => {
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = 'rgba(1, 1, 3, 0.16)'; // دنباله فوتونی نرم حرکتی
            ctx.fillRect(0, 0, width, height);

            // ۱. رندر هاله درخشان گداخته پس‌زمینه (نور گازهای چرخنده)
            const glow = ctx.createRadialGradient(centerX, centerY, 110, centerX, centerY, 320);
            glow.addColorStop(0, 'rgba(255, 69, 0, 0.28)');
            glow.addColorStop(0.3, 'rgba(255, 140, 0, 0.08)');
            glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 320, 0, Math.PI * 2);
            ctx.fill();

            // ۲. پردازش و رسم حلقه فوتون‌ها
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // ۳. تاریکی مطلق مرکز سیاه‌چاله (Schwarzschild Shadow Void)
            ctx.globalAlpha = 1.0;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 125, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            requestAnimationFrame(animate);
        };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        });

        // تعامل ارگانیک و لرزش گرانشی با حرکت موس یا لمس صفحه
        window.addEventListener('mousemove', (e) => {
            centerX = (width / 2) + (e.clientX - width / 2) * 0.035;
            centerY = (height / 2) + (e.clientY - height / 2) * 0.035;
            
            const core = document.querySelector('.singularity-core');
            if(core) {
                core.style.left = `${centerX}px`;
                core.style.top = `${centerY}px`;
            }
        });

        animate();
    </script>
