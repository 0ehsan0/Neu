<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core Console Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            width: 440px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff8c00;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 12px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { 
            box-shadow: 0 0 30px rgba(255, 119, 0, 0.6); 
        }

        /* منوی سوییچ بین CMD و PowerShell */
        .terminal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tab-btn {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active[data-type="cmd"] {
            background: #000; color: #00ff00; border-color: #00ff00;
        }
        .tab-btn.active[data-type="ps"] {
            background: #012456; color: #fff; border-color: #2dbcff;
        }

        /* محفظه اصلی ترمینال مالتی‌مسترس */
        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.3s ease;
        }

        /* استایل اختصاصی حالت CMD */
        .cmd-terminal.theme-cmd {
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
        }
        .cmd-terminal.theme-cmd .err { color: #ff3300; }
        .cmd-terminal.theme-cmd .info { color: #ffaa00; }

        /* استایل اختصاصی حالت PowerShell */
        .cmd-terminal.theme-ps {
            background: rgba(1, 36, 86, 0.95);
            color: #ffffff;
        }
        .cmd-terminal.theme-ps .err { color: #ff6b6b; background: #500; padding: 0 4px; }
        .cmd-terminal.theme-ps .info { color: #ffff00; }
        .cmd-terminal.theme-ps .prompt { color: #2dbcff; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@phrazel</h2>
        
        <div class="input-group">
            <input type="text" id="target-target" placeholder="e.g., 1.1.1.1 or google.com" value="1.1.1.1" autocomplete="off" spellcheck="false">
        </div>
        
        <button class="btn" onclick="startExecutionPing()">TEST CONNECTION</button>

        <div class="terminal-tabs">
            <button class="tab-btn active" data-type="cmd" onclick="setTerminalTheme('cmd')">cmd.exe</button>
            <button class="tab-btn" data-type="ps" onclick="setTerminalTheme('ps')">PowerShell</button>
        </div>

        <div class="cmd-terminal theme-cmd" id="terminal-out">
            <p class="info">Console ready. Select interface and ping...</p>
        </div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        let currentTheme = 'cmd';

        function setTerminalTheme(theme) {
            currentTheme = theme;
            const term = document.getElementById('terminal-out');
            const tabs = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.tab-btn[data-type="${theme}"]`).classList.add('active');

            if (theme === 'cmd') {
                term.className = 'cmd-terminal theme-cmd';
                term.innerHTML = '<p class="info">Switched to Command Prompt. System ready.</p>';
            } else {
                term.className = 'cmd-terminal theme-ps';
                term.innerHTML = '<p class="prompt">Windows PowerShell<br>Copyright (C) Microsoft Corporation. All rights reserved.</p><p class="info">Ready for Test-Connection...</p>';
            }
        }

        function logToTerminal(text, className = '') {
            const term = document.getElementById('terminal-out');
            const p = document.createElement('p');
            if(className) p.className = className;
            
            // افزودن نشانگرهای خط فرمان محلی متناسب با پوسته انتخابی
            if (currentTheme === 'ps' && !className) {
                p.innerHTML = `<span style="color:#2dbcff">PS C:\\Users\\neuxp></span> ${text}`;
            } else if (currentTheme === 'cmd' && !className) {
                p.innerHTML = `<span>C:\\Users\\neuxp></span>${text}`;
            } else {
                p.innerText = text;
            }
            
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        async function startExecutionPing() {
            let target = document.getElementById('target-target').value.trim();
            const term = document.getElementById('terminal-out');
            
            if (!target) {
                logToTerminal("Error: Target space cannot be empty.", "err");
                return;
            }

            target = target.replace(/^(https?:\/\/)/, "").replace(/\/$/, "");
            term.innerHTML = ""; 
            
            if (currentTheme === 'cmd') {
                logToTerminal(`Pinging ${target} with 32 bytes of data:`, "info");
            } else {
                logToTerminal(`Sending ICMP echo requests to ${target}...`, "info");
            }

            for (let i = 1; i <= 4; i++) {
                await new Promise(resolve => {
                    const startTime = Date.now();
                    let completed = false;

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => {
                        if (!completed) {
                            completed = true;
                            controller.abort();
                            logToTerminal(currentTheme === 'cmd' ? `Request timed out for packet ${i}.` : `Test-Connection : Method failed for packet ${i}.`, "err");
                            resolve();
                        }
                    }, 3500);

                    fetch(`https://${target}/?t=${Math.random()}`, { 
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        signal: controller.signal 
                    })
                    .then(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            logToTerminal(currentTheme === 'cmd' ? `Reply from ${target}: bytes=32 time=${duration}ms TTL=54` : `Source: Localhost, Destination: ${target}, Time: ${duration}ms, Status: Success`);
                            resolve();
                        }
                    })
                    .catch(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutId);
                            const duration = Date.now() - startTime;
                            if (duration < 3000) {
                                logToTerminal(currentTheme === 'cmd' ? `Reply from ${target}: bytes=32 time=${duration}ms` : `Source: Localhost, Destination: ${target}, Time: ${duration}ms, Status: Connected`);
                            } else {
                                logToTerminal(currentTheme === 'cmd' ? `Request timed out for packet ${i}.` : `Ping failed for packet ${i}.`, "err");
                            }
                            resolve();
                        }
                    });
                });
                
                await new Promise(r => setTimeout(r, 600));
            }
        }

        // 🌌 موتور گرافیکی غبار گازی سیاه‌چاله EHT
        window.addEventListener('load', () => {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY, dpr;

            function resizeAndScale() {
                dpr = Math.min(window.devicePixelRatio || 1, 2); 
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width * dpr; canvas.height = height * dpr;
                centerX = (width / 2) * dpr; centerY = (height / 2) * dpr;
            }
            resizeAndScale();

            const particleCount = 450; const particles = [];
            const colors = ['#ff2a00', '#ff5100', '#ff7700', '#ff9900', '#ffffff'];

            class Particle {
                constructor() {
                    this.reset();
                    this.radius = Math.random() * (Math.max(canvas.width, canvas.height) / 1.3);
                    this.angle = Math.random() * Math.PI * 2;
                }
                reset() {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = 135 * dpr + Math.random() * (180 * dpr);
                    this.speed = (0.3 + Math.random() * 0.7) * dpr; 
                    this.rotationSpeed = 0.009 + Math.random() * 0.014; 
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.size = (3 + Math.random() * 9) * dpr; 
                    this.opacity = 0;
                }
                update() {
                    this.angle += this.rotationSpeed;
                    this.radius += Math.sin(this.angle * 2) * 0.12;
                    const coreRadius = 125 * dpr; const horizonFade = 320 * dpr;
                    if (this.radius < horizonFade && this.radius > coreRadius) {
                        this.opacity = (horizonFade - this.radius) / (horizonFade - coreRadius) * 0.28;
                    } else { this.opacity = 0.02; }
                }
                draw() {
                    const x = centerX + Math.cos(this.angle) * this.radius;
                    const y = centerY + Math.sin(this.angle) * this.radius * 0.68; 
                    ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            const animate = () => {
                ctx.globalAlpha = 1.0; ctx.fillStyle = 'rgba(1, 1, 3, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const coreRadius = 120 * dpr; const glowRadius = 340 * dpr;
                const mainGlow = ctx.createRadialGradient(centerX, centerY, coreRadius, centerX, centerY, glowRadius);
                mainGlow.addColorStop(0, 'rgba(255, 35, 0, 0.45)');
                mainGlow.addColorStop(0.25, 'rgba(255, 90, 0, 0.16)');
                mainGlow.addColorStop(0.6, 'rgba(255, 140, 0, 0.02)');
                mainGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = mainGlow; ctx.beginPath(); ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2); ctx.fill();

                particles.forEach(p => { p.update(); p.draw(); });
                ctx.globalAlpha = 1.0; ctx.beginPath(); ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2); ctx.fillStyle = '#010103'; ctx.fill();
                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', () => { resizeAndScale(); });
            animate();
        });
    </script>
</body>
</html>
