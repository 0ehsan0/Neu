<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* پنجره مدرن شیشه‌ای نیمه‌شفاف وسط صفحه */
        .singularity-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            text-align: center;
            padding: 35px 50px; 
            border-radius: 24px;
            background: rgba(3, 3, 6, 0.4);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 110, 0, 0.2);
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }
        .singularity-core h2 {
            color: #fff; 
            font-size: 2.2rem; 
            margin-bottom: 25px;
            letter-spacing: 3px; 
            font-weight: 800;
            text-shadow: 0 2px 15px rgba(0,0,0,0.6);
        }
        .btn {
            display: inline-block; 
            text-decoration: none; 
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px 42px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 30px; 
            letter-spacing: 1px; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            box-shadow: 0 6px 20px rgba(255, 55, 0, 0.35);
        }
        .btn:hover { 
            box-shadow: 0 0 40px #ff7700, 0 0 15px #ff3700; 
            transform: scale(1.06) translateY(-1px); 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="singularity-core">
        <h2>@phrazel</h2>
        <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let centerX = width / 2;
        let centerY = height / 2;

        const particleCount = 650; // تعداد فوتون بالا برای پر کردن فضا
        const particles = [];
        const colors = ['#ff3300', '#ff6600', '#ffaa00', '#ffd27f', '#ffffff'];

        class Particle {
            constructor() {
                this.reset();
                // پخش تصادفی اولیه در فضا
                this.radius = Math.random() * (Math.max(width, height) / 1.3);
                this.angle = Math.random() * Math.PI * 2;
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.max(width, height) / 1.3 + Math.random() * 50;
                this.speed = 1.2 + Math.random() * 2.2; 
                this.rotationSpeed = 0.02 + Math.random() * 0.025; 
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = 1.0 + Math.random() * 2.5;
                this.opacity = 0;
            }

            update() {
                // حرکت حلزونی به سمت مرکز
                this.radius -= this.speed;
                this.angle += this.rotationSpeed;

                // فرمول درخشش گرانشی گام‌به‌گام
                if (this.radius < 450 && this.radius > 140) {
                    this.opacity = (450 - this.radius) / 250;
                } else if (this.radius >= 450) {
                    this.opacity = 0.05;
                }

                // بازیافت ذرات بلعیده شده در مرکز
                if (this.radius <= 135) {
                    this.reset();
                }
            }

            draw() {
                // ذخیره فریم قبلی برای ایجاد کشیدگی و دنباله نوری سینمایی (Motion Blur Trail)
                const lastX = centerX + Math.cos(this.angle - this.rotationSpeed) * (this.radius + this.speed);
                const lastY = centerY + Math.sin(this.angle - this.rotationSpeed) * (this.radius + this.speed) * 0.55;

                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius * 0.55; 

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.lineWidth = this.size;
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = this.opacity * 0.8;
                ctx.stroke();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        const animate = () => {
            // ایجاد عمق فضایی تاریک و دنباله‌دار
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = 'rgba(2, 2, 5, 0.12)'; 
            ctx.fillRect(0, 0, width, height);

            // ایجاد هاله‌های گداخته و نورهای حجیم گوسی در افق رویداد سیاه‌چاله
            const mainGlow = ctx.createRadialGradient(centerX, centerY, 120, centerX, centerY, 380);
            mainGlow.addColorStop(0, 'rgba(255, 51, 0, 0.35)');
            mainGlow.addColorStop(0.2, 'rgba(255, 102, 0, 0.12)');
            mainGlow.addColorStop(0.5, 'rgba(255, 170, 0, 0.03)');
            mainGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = mainGlow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 380, 0, Math.PI * 2);
            ctx.fill();

            // رسم خطوط نوری گازهای کیهانی
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // هسته مرکزی مشکی مطلق (سایه انشتین)
            ctx.globalAlpha = 1.0;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 135, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            requestAnimationFrame(animate);
        };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        });

        // جاذبه داینامیک و تغییر افق دید با موس
        window.addEventListener('mousemove', (e) => {
            centerX = (width / 2) + (e.clientX - width / 2) * 0.04;
            centerY = (height / 2) + (e.clientY - height / 2) * 0.04;
            
            const core = document.querySelector('.singularity-core');
            if(core) {
                core.style.left = `${centerX}px`;
                core.style.top = `${centerY}px`;
            }
        });

        animate();
    </script>
</body>
</html>
