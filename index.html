<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core CMD Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(4, 4, 7, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.22);
            box-shadow: 0 35px 80px rgba(0,0,0,0.95);
            width: 440px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 40%, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 69, 0, 0.25);
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        .input-group input:focus {
            border-color: #ff7700;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 15px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 14px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .btn:hover { 
            box-shadow: 0 0 35px rgba(255, 119, 0, 0.55); 
        }
        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 15px;
            height: 190px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            text-align: left;
            background: rgba(3, 3, 5, 0.9);
            color: #00ff66;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.6);
        }
        .cmd-terminal .info { color: #ffaa00; }
    </style>
</head>
<body>

        </div>
