<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Core Console Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        .network-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.65);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            width: 440px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff8c00;
        }
        .btn {
            display: block; 
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 12px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { 
            box-shadow: 0 0 30px rgba(255, 119, 0, 0.6); 
        }
        .terminal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tab-btn {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active[data-type="cmd"] {
            background: #000; color: #00ff00; border-color: #00ff00;
        }
        .tab-btn.active[data-type="ps"] {
            background: #012456; color: #fff; border-color: #2dbcff;
        }
        .cmd-terminal {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.3s ease;
        }
        .cmd-terminal.theme-cmd {
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
        }
        .cmd-terminal.theme-cmd .err { color: #ff3300; }
        .cmd-terminal.theme-cmd .info { color: #ffaa00; }
        .cmd-terminal.theme-ps {
            background: rgba(1, 36, 86, 0.95);
            color: #ffffff;
        }
        .cmd-terminal.theme-ps .err { color: #ff6b6b; background: #500; padding: 0 4px; }
        .cmd-terminal.theme-ps .info { color: #ffff00; }
        .cmd-terminal.theme-ps .prompt { color: #2dbcff; }
    </style>
</head>
<body>

    <div class="network-panel">
        <h2>@
