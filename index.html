<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUXP | Cloudflare Clean IP Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .network-panel {
            position: relative;
            z-index: 15; 
            padding: 35px; 
            border-radius: 24px;
            background: #09090d;
            border: 1px solid rgba(255, 90, 0, 0.25);
            box-shadow: 0 40px 90px rgba(0,0,0,0.95);
            width: 550px;
        }
        .network-panel h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 40%, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .action-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 2;
            color: #fff;
            background: linear-gradient(135deg, #ff2a00, #ff7700);
            padding: 15px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border-radius: 14px; 
            letter-spacing: 1px; 
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn.copy-btn {
            flex: 1;
            background: linear-gradient(135deg, #2dbcff, #0088cc);
        }
        .btn:hover { box-shadow: 0 0 35px rgba(255, 119, 0, 0.4); }
        .btn.copy-btn:hover { box-shadow: 0 0 35px rgba(0, 136, 204, 0.4); }
