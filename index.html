<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT Singularity | @phrazel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* 🌌 فضا و ساختار اصلی شبیه‌ساز سیاه‌چاله دریبل */
        .blackhole-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.9);
        }

        /* ۱. هاله پلاسمای گازی گداخته (Accretion Disk) */
        .accretion-disk {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #ff2a00 0%,
                #ff6a00 25%,
                #ffaa00 50%,
                #ff5100 75%,
                #ff2a00 100%
            );
            filter: blur(40px);
            opacity: 0.85;
            animation: rotateDisk 18s linear infinite;
        }

        /* ۲. لایه غبار داغ ثانویه برای ایجاد بافت مه آلود واقعی */
        .cosmic-dust {
            position: absolute;
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,106,0,0.2) 0%, rgba(255,42,0,0.6) 40%, transparent 70%);
            filter: blur(25px);
            animation: pulseGlow 6s ease-in-out infinite alternate;
        }

        /* ۳. افق رویداد و هسته تاریک مطلق (Schwarzschild Void) */
        .event-horizon {
            position: absolute;
            width: 250px;
            height: 250px;
            background: #010103;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 
                0 0 60px 20px #010103,
                inset 0 0 40px rgba(0, 0, 0, 1);
        }

        /* ۴. باکس شیشه‌ای مرکزی اختصاصی شما */
        .singularity-core {
            position: absolute;
            z-index: 15; 
            text-align: center;
            padding: 35px 50px; 
            border-radius: 24px;
            background: rgba(3, 3, 5, 0.4);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 90, 0, 0.2);
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
        }
        
        .singularity-core h2 {
            color: #fff; 
            font-size: 2.2rem; 
            margin-bottom: 25px;
            letter-spacing: 3px; 
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-block; 
            text-decoration: none; 
            color: #fff;
            background: linear-gradient(135deg, #ff3700, #ff7700);
            padding: 14px 42px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border-radius: 30px; 
            letter-spacing: 1px; 
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 5px 15px rgba(255, 55, 0, 0.3);
        }

        .btn:hover { 
            box-shadow: 0 0 40px #ff7700, 0 0 15px #ff3700; 
            transform: scale(1.06); 
            cursor: pointer; 
        }

        /* 🎬 ساختار انیمیشن‌های بومی کیهانی */
        @keyframes rotateDisk {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1.05); opacity: 0.9; }
        }

        /* بهینه‌سازی ریسپانسیو مانیتور و گوشی */
        @media (max-width: 768px) {
            .blackhole-container {
                transform: scale(0.6);
            }
            .singularity-core h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="blackhole-container">
        <div class="accretion-disk"></div>
        
        <div class="cosmic-dust"></div>
        
        <div class="event-horizon"></div>
        
        <div class="singularity-core">
            <h2>@phrazel</h2>
            <a href="https://t.me/phrazel" target="_blank" class="btn">ENTER VOID</a>
        </div>
    </div>

    <script>
        // افزودن تعامل ظریف سه‌بعدی به حرکت موس بدون درگیر کردن کدهای سنگین کانواس
        const container = document.querySelector('.blackhole-container');
        if (container) {
            window.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
                const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
                container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(${window.innerWidth < 768 ? 0.6 : 0.9})`;
            });
        }
    </script>
</body>
</html>
